<!DOCTYPE html>
<html>
    <head>
        <title>게임 제보 및 문의 사이트</title>
    </head>
    <body>
        <header>
        <h2>고객 문의 센터</h2>
        </header>
        <section>
        <label>유저님의 닉네임을 적어주세요! : <input type="text" placeholder="예)잘생긴총잡이"></label><br>
        <hr>
        현재 발생한 문제를 알려주세요! : <select name="buglist">
        <option value="1">게임내 부정행위 유저 신고</option>
        <option value="2">결제 및 환불</option>
        <option value="3">버그 제보</option>
        </select><br>
        <hr>

        유저분의 서버를 골라주세요! : <select name="server">
            <option value="4">South Korea</option>
            <option value="5">Canada</option>
            <option value="6">Japan</option>
        </select><br>
        <hr>
        <table>
            <td align="center">유저분께서 겪고계신 문제점에 대해 설명해주세요! : </td>
            <textarea cols="50" rows="10"></textarea><br>
        </table>
        <hr>
        </section>
        고객 문의 센터의 만족도를 알려주세요! :
        <input type="radio" name="rahh" value="7">매우 불만족
        <input type="radio" name="rahh" value="8">불만족
        <input type="radio" name="rahh" value="9" checked>보통
        <input type="radio" name="rahh" value="10">만족
        <input type="radio" name="rahh" value="11">매우 만족<br>
        <hr>

        <input type="submit" value="제출"> <br>
    </body>
</html>
