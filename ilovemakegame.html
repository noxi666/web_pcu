<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게임 제보 및 문의 사이트</title>
</head>
<body>

    <div align="center">
        <table width="500" border="0">
            <tr>
                <td>

                    <header>
                        <h1 align="center">고객 문의 센터</h1>
                        <p align="center">문제 발생 시 아래 양식을 작성해주세요</p>
                    </header>

                    <main>
                        <section>
                            <form>

                                <p>
                                    <label>닉네임 입력</label><br>
                                    <input type="text" placeholder="예) 잘생긴총잡이">
                                </p>

                                <hr>

                                <p>
                                    <label>문제 유형 선택</label><br>
                                    <select>
                                        <option>게임 내 부정행위 유저 신고</option>
                                        <option>결제 및 환불</option>
                                        <option>버그 제보</option>
                                    </select>
                                </p>

                                <hr>

                                <p>
                                    <label>서버 선택</label><br>
                                    <select>
                                        <option>South Korea</option>
                                        <option>Canada</option>
                                        <option>Japan</option>
                                    </select>
                                </p>

                                <hr>

                                <p>
                                    <label>문제 설명</label><br>
                                    <textarea cols="50" rows="10"></textarea>
                                </p>

                                <hr>

                                <fieldset>
                                    <legend>만족도</legend>

                                    <input type="radio" name="rate"> 매우 불만족<br>
                                    <input type="radio" name="rate"> 불만족<br>
                                    <input type="radio" name="rate" checked> 보통<br>
                                    <input type="radio" name="rate"> 만족<br>
                                    <input type="radio" name="rate"> 매우 만족<br>
                                </fieldset>

                                <hr>

                                <p align="center">
                                    <input type="submit" value="제출">
                                </p>

                            </form>
                        </section>
                    </main>

                </td>
            </tr>
        </table>
    </div>

</body>
</html>
