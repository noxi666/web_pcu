<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임 제보 및 문의 사이트</title>
</head>
<body>
    <header>
        <h1>고객 문의 센터</h1>
        <p>게임 이용 중 발생한 문제나 문의 사항을 접수하는 페이지입니다.</p>
    </header>

    <main>
        <section>
            <h2>문의 작성</h2>

            <form action="#" method="post">
                <p>
                    <label for="nickname">유저님의 닉네임을 적어주세요!</label><br>
                    <input type="text" id="nickname" name="nickname" placeholder="예) 잘생긴총잡이">
                </p>

                <hr>

                <p>
                    <label for="buglist">현재 발생한 문제를 알려주세요!</label><br>
                    <select id="buglist" name="buglist">
                        <option value="1">게임 내 부정행위 유저 신고</option>
                        <option value="2">결제 및 환불</option>
                        <option value="3">버그 제보</option>
                    </select>
                </p>

                <hr>

                <p>
                    <label for="server">유저분의 서버를 골라주세요!</label><br>
                    <select id="server" name="server">
                        <option value="4">South Korea</option>
                        <option value="5">Canada</option>
                        <option value="6">Japan</option>
                    </select>
                </p>

                <hr>

                <p>
                    <label for="description">유저분께서 겪고 계신 문제점에 대해 설명해주세요!</label><br>
                    <textarea id="description" name="description" cols="50" rows="10"></textarea>
                </p>

                <hr>

                <fieldset>
                    <legend>고객 문의 센터의 만족도를 알려주세요!</legend>

                    <input type="radio" id="very_bad" name="satisfaction" value="7">
                    <label for="very_bad">매우 불만족</label>

                    <input type="radio" id="bad" name="satisfaction" value="8">
                    <label for="bad">불만족</label>

                    <input type="radio" id="normal" name="satisfaction" value="9" checked>
                    <label for="normal">보통</label>

                    <input type="radio" id="good" name="satisfaction" value="10">
                    <label for="good">만족</label>

                    <input type="radio" id="very_good" name="satisfaction" value="11">
                    <label for="very_good">매우 만족</label>
                </fieldset>

                <hr>

                <button type="submit">제출</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 고객 문의 센터</p>
    </footer>
</body>
</html>
